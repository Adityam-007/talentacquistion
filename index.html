<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent Acquisition Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #eef2f7;
}

header {
  background: linear-gradient(135deg, #1f2937, #2563eb);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: 600;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
  transition: transform 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

h2 { margin-top: 0; }

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  font-size: 14px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #2563eb;
}

button {
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1e40af;
}

.job {
  padding: 15px;
  border-radius: 10px;
  background: #f9fafb;
  margin-bottom: 12px;
  animation: fadeIn 0.3s ease-in-out;
}

.job h3 { margin: 0; }
.job p { margin: 5px 0; }

.actions {
  display: flex;
  gap: 10px;
}

.delete {
  background: #ef4444;
}

.delete:hover {
  background: #b91c1c;
}

.search {
  margin-bottom: 15px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);} 
  to { opacity: 1; transform: translateY(0);} 
}

.empty {
  text-align: center;
  color: #6b7280;
  padding: 20px;
}

</style>
</head>
<body>

<header>Talent Acquisition Dashboard</header>

<div class="container">

<div class="card">
<h2>Post a Job</h2>
<input id="title" placeholder="Job Title">
<input id="company" placeholder="Company Name">
<textarea id="description" placeholder="Job Description"></textarea>
<button onclick="addJob()">Post Job</button>
</div>

<div class="card">
<h2>Available Jobs</h2>
<input class="search" id="search" placeholder="Search jobs..." onkeyup="searchJobs()">
<div id="jobs"></div>
</div>

</div>

<script>
let jobs = JSON.parse(localStorage.getItem('jobs')) || [];

function saveJobs() {
  localStorage.setItem('jobs', JSON.stringify(jobs));
}

function addJob() {
  const title = document.getElementById('title').value.trim();
  const company = document.getElementById('company').value.trim();
  const description = document.getElementById('description').value.trim();

  if (!title || !company || !description) {
    alert('All fields are required');
    return;
  }

  jobs.unshift({ title, company, description });
  saveJobs();
  displayJobs();

  document.getElementById('title').value = '';
  document.getElementById('company').value = '';
  document.getElementById('description').value = '';
}

function displayJobs(filtered = jobs) {
  const jobsDiv = document.getElementById('jobs');
  jobsDiv.innerHTML = '';

  if (filtered.length === 0) {
    jobsDiv.innerHTML = '<div class="empty">No jobs found</div>';
    return;
  }

  filtered.forEach((job, index) => {
    const jobEl = document.createElement('div');
    jobEl.className = 'job';

    jobEl.innerHTML = `
      <h3>${job.title}</h3>
      <p><strong>${job.company}</strong></p>
      <p>${job.description}</p>
      <div class="actions">
        <button class="delete" onclick="deleteJob(${index})">Delete</button>
      </div>
    `;

    jobsDiv.appendChild(jobEl);
  });
}

function deleteJob(index) {
  if (confirm('Delete this job?')) {
    jobs.splice(index, 1);
    saveJobs();
    displayJobs();
  }
}

function searchJobs() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = jobs.filter(j =>
    j.title.toLowerCase().includes(query) ||
    j.company.toLowerCase().includes(query)
  );
  displayJobs(filtered);
}

// initial load
displayJobs();
</script>

</body>
</html>
